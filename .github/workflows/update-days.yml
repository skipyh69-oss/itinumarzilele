name: Zilnic actualizează days.lua

on:
  schedule:
    # Rulează în fiecare zi la 00:00 UTC
    - cron: '0 0 * * *'
  # Permite declanșarea manuală, pentru testare
  workflow_dispatch:

jobs:
  update-days:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculează diferența în zile și actualizează days.lua
        run: |
          # Data ultimului update (Modifică aici data ta fixă)
          LAST_DATE="2026-06-09"
          TODAY=$(date -u +%Y-%m-%d)
          # Calculează diferența în secunde și apoi în zile
          DAYS=$(( ($(date -d "$TODAY" +%s) - $(date -d "$LAST_DATE" +%s)) / 86400 ))

          # Scrie noul conținut în fișierul days.lua
          echo "-- Acest fișier este actualizat automat zilnic." > days.lua
          echo "-- Data ultimului update: $LAST_DATE" >> days.lua
          echo "local daysSinceLastUpdate = $DAYS" >> days.lua
          echo "return daysSinceLastUpdate" >> days.lua

      - name: Commit și push dacă există modificări
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add days.lua
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizare automată days.lua pentru $TODAY"
          git push
